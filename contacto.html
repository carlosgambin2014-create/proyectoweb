<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Web - Contacto</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="sitio-header">
        <div class="logo">
            <strong>Panda</strong>Web
        </div>
        <nav class="sitio-nav">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="contacto.html" class="activo">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor-contacto">
        <section class="contacto-seccion">
            <header class="contacto-cabecera">
                <h1>Ponte en contacto</h1>
                <p>¿Tienes dudas sobre las técnicas de maquetación? Escríbenos y te responderemos lo antes posible.</p>
            </header>

            <form action="#" method="POST" class="formulario-contacto">
                
                <div class="grupo-formulario">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Rosa Montero" required>
                </div>

                <div class="grupo-formulario">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="grupo-formulario">
                    <label for="motivo">Motivo de la consulta</label>
                    <select id="motivo" name="motivo" required>
                        <option value="" disabled selected>Selecciona una opción...</option>
                        <option value="sugerencia">Sugerencia de código</option>
                        <option value="error">Reportar un bug del laboratorio</option>
                        <option value="colaboracion">Propuesta de colaboración</option>
                        <option value="otros">Otros asuntos</option>
                    </select>
                </div>

                <div class="grupo-formulario">
                    <label for="mensaje">Tu mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe aquí los detalles de tu consulta..." required></textarea>
                </div>

                <div class="grupo-checkbox">
                    <input type="checkbox" id="privacidad" name="privacidad" required>
                    <label for="privacidad">Acepto la política de privacidad y el tratamiento de mis datos.</label>
                </div>

                <button type="submit" class="boton-enviar">Enviar Mensaje</button>

            </form>
        </section>
    </main>

    <footer class="sitio-footer">
        <p>&copy; 2026 Laboratorio de Prácticas Web. Creado bajo estándares modernos.</p>
    </footer>

</body>
</html>
